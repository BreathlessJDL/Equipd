<!-- Equipd email — Content card component -->
<!-- Placeholder: {{body}} — HTML-safe rich text injected by sender -->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" class="email-content">
  <tr>
    <td align="center" style="padding: 0 24px 24px 24px;" class="email-content__outer">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" class="email-content__card" style="max-width: 520px; border-collapse: separate; border-spacing: 0;">
        <tr>
          <td class="email-content__card-inner" style="background-color: #ffffff; border: 1px solid #dde3ea; border-radius: 16px; padding: 28px 28px 32px 28px; font-family: Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif; font-size: 16px; line-height: 1.6; color: #0f2137;">
            <div class="email-body">
              {{{body}}}
            </div>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
