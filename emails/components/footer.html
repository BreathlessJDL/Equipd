<!-- Equipd email — Footer component -->
<!-- Placeholders: {{base_url}}, {{year}} -->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" class="email-footer">
  <tr>
    <td align="center" style="padding: 4px 24px 0 24px;" class="email-footer__divider-cell">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 520px;">
        <tr>
          <td style="border-top: 1px solid #e8ecf0; font-size: 0; line-height: 0; height: 1px;">&nbsp;</td>
        </tr>
      </table>
    </td>
  </tr>

  <tr>
    <td align="center" style="padding: 18px 24px 10px 24px;" class="email-footer__links-cell">
      <p class="email-footer__links" style="margin: 0; font-family: Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif; font-size: 12px; line-height: 1.7; color: #9aa3ad;">
        <a href="{{base_url}}/help" target="_blank" rel="noopener noreferrer" class="email-footer__link" style="color: #9aa3ad; text-decoration: none;">Help Centre</a>
        <span aria-hidden="true" style="color: #d1d5db; padding: 0 6px;">·</span>
        <a href="{{base_url}}/support" target="_blank" rel="noopener noreferrer" class="email-footer__link" style="color: #9aa3ad; text-decoration: none;">Contact Support</a>
        <span aria-hidden="true" style="color: #d1d5db; padding: 0 6px;">·</span>
        <a href="{{base_url}}/terms" target="_blank" rel="noopener noreferrer" class="email-footer__link" style="color: #9aa3ad; text-decoration: none;">Terms &amp; Conditions</a>
        <span aria-hidden="true" style="color: #d1d5db; padding: 0 6px;">·</span>
        <a href="{{base_url}}/privacy" target="_blank" rel="noopener noreferrer" class="email-footer__link" style="color: #9aa3ad; text-decoration: none;">Privacy Policy</a>
      </p>
    </td>
  </tr>

  <tr>
    <td align="center" style="padding: 0 24px 24px 24px;" class="email-footer__meta-cell">
      <p class="email-footer__copyright" style="margin: 0 0 4px 0; font-family: Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif; font-size: 11px; line-height: 1.5; color: #b0b8c1;">
        &copy; {{year}} Equipd
      </p>
      <p class="email-footer__sent-by" style="margin: 0; font-family: Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif; font-size: 11px; line-height: 1.5; color: #b0b8c1;">
        This email was sent by Equipd.
      </p>
    </td>
  </tr>
</table>
