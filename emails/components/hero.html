<!-- Equipd email — Hero component -->
<!-- Placeholders: {{title}}, {{subtitle}} (optional) -->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" class="email-hero">
  <tr>
    <td align="center" style="padding: 8px 24px 24px 24px;" class="email-hero__cell">
      <h1 class="email-hero__title" style="margin: 0 0 12px 0; font-family: Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif; font-size: 28px; line-height: 1.25; font-weight: 600; letter-spacing: -0.02em; color: #0f2137;">
        {{title}}
      </h1>
      {{#if subtitle}}
      <p class="email-hero__subtitle" style="margin: 0; max-width: 480px; font-family: Inter, 'Segoe UI', system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif; font-size: 16px; line-height: 1.55; font-weight: 400; color: #5c6570;">
        {{subtitle}}
      </p>
      {{/if}}
    </td>
  </tr>
</table>
